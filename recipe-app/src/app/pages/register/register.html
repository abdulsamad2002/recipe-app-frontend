<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="brand-icon">🍳</span>
      <h1 class="brand-title">RecipeShare</h1>
    </div>

    <h2 class="auth-heading">Create an account</h2>
    <p class="auth-sub">Join the community and start sharing recipes</p>

    @if (error()) {
      <div class="error-banner" role="alert">{{ error() }}</div>
    }

    <form (ngSubmit)="submit()" novalidate>
      <div class="field">
        <label for="username">Username</label>
        <input
          id="username"
          type="text"
          [(ngModel)]="username"
          name="username"
          placeholder="chef_anna"
          autocomplete="username"
          required
        />
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="field">
        <label for="password">Password <span class="hint">(min 6 chars)</span></label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          autocomplete="new-password"
          required
        />
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading()">
        {{ loading() ? 'Creating account…' : 'Create account' }}
      </button>
    </form>

    <p class="auth-footer">
      Already have an account?
      <a routerLink="/login">Sign in</a>
    </p>
  </div>
</div>
